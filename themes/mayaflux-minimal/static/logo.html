<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #161614; overflow: hidden; }
canvas { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 1920, H = 1080;
const DPR = window.devicePixelRatio || 1;
canvas.width = W * DPR;
canvas.height = H * DPR;
canvas.style.width = '100%';
canvas.style.height = H + 'px';
ctx.scale(DPR, DPR);
ctx.scale(1, 1.5);

// --- color palette ---
const BLUE   = [55,  138, 221];
const AMBER  = [186, 117,  23];
const GRAY   = [180, 178, 169];
const BG     = '#161614';

function rgba(rgb, a) {
  return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`;
}

function lerpColor(a, b, t) {
  return [
    a[0] + (b[0]-a[0])*t,
    a[1] + (b[1]-a[1])*t,
    a[2] + (b[2]-a[2])*t
  ];
}

// --- imperceptible variation seed, changes each load ---
// bounded: each param shifts the geometry by a tiny amount
const seed = {
  oRadiusX:   280 + (Math.random()-0.5) * 12,
  oRadiusY:   160 + (Math.random()-0.5) * 8,
  oPhase:     (Math.random()-0.5) * 0.08,
  oInnerR:    105 + (Math.random()-0.5) * 6,
  vArm1Scale: 1   + (Math.random()-0.5) * 0.06,
  vArm2Scale: 1   + (Math.random()-0.5) * 0.06,
  vThin:      0   + (Math.random()-0.5) * 0.04,
  vPhase:     (Math.random()-0.5) * 0.07,
};

// --- draw a stroked path with a color that shifts along it ---
// pts: array of {x,y}, colorA at t=0, colorB at t=1
function strokeGradientPath(pts, colorA, colorB, lineWidth, alphaA, alphaB) {
  if (pts.length < 2) return;
  for (let i = 0; i < pts.length - 1; i++) {
    const t0 = i / (pts.length - 1);
    const t1 = (i+1) / (pts.length - 1);
    const c0 = lerpColor(colorA, colorB, t0);
    const c1 = lerpColor(colorA, colorB, t1);
    const a0 = alphaA + (alphaB - alphaA) * t0;
    const a1 = alphaA + (alphaB - alphaA) * t1;
    const grd = ctx.createLinearGradient(pts[i].x, pts[i].y, pts[i+1].x, pts[i+1].y);
    grd.addColorStop(0, rgba(c0, a0));
    grd.addColorStop(1, rgba(c1, a1));
    ctx.beginPath();
    ctx.moveTo(pts[i].x, pts[i].y);
    ctx.lineTo(pts[i+1].x, pts[i+1].y);
    ctx.strokeStyle = grd;
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
}

// sample a bezier curve into n points
function sampleCubic(p0, p1, p2, p3, n) {
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const mt = 1 - t;
    pts.push({
      x: mt*mt*mt*p0.x + 3*mt*mt*t*p1.x + 3*mt*t*t*p2.x + t*t*t*p3.x,
      y: mt*mt*mt*p0.y + 3*mt*mt*t*p1.y + 3*mt*t*t*p2.y + t*t*t*p3.y,
    });
  }
  return pts;
}

// sample a quadratic bezier
function sampleQuad(p0, p1, p2, n) {
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const mt = 1 - t;
    pts.push({
      x: mt*mt*p0.x + 2*mt*t*p1.x + t*t*p2.x,
      y: mt*mt*p0.y + 2*mt*t*p1.y + t*t*p2.y,
    });
  }
  return pts;
}

// sample an ellipse arc
function sampleEllipseArc(cx, cy, rx, ry, startA, endA, n, phase) {
  const pts = [];
  phase = phase || 0;
  for (let i = 0; i <= n; i++) {
    const a = startA + (endA - startA) * (i/n) + phase;
    pts.push({ x: cx + rx * Math.cos(a), y: cy + ry * Math.sin(a) });
  }
  return pts;
}

function dot(x, y, r, color, alpha) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = rgba(color, alpha);
  ctx.fill();
}

// --- gate mark ---
function drawGate(cx, cy, h, opacity) {
  const tipL = cx - h*0.22;
  const tipR = cx + h*0.22;
  const top  = cy - h*0.5;
  const bot  = cy + h*0.5;

  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.strokeStyle = '#B4B2A9';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // left chevron
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(tipL + h*0.09, top);
  ctx.lineTo(tipL, cy);
  ctx.lineTo(tipL + h*0.09, bot);
  ctx.stroke();

  // right chevron
  ctx.beginPath();
  ctx.moveTo(tipR - h*0.09, top);
  ctx.lineTo(tipR, cy);
  ctx.lineTo(tipR - h*0.09, bot);
  ctx.stroke();

  // dashed pipe
  ctx.lineWidth = 0.8;
  ctx.setLineDash([3.5, 3.5]);
  ctx.beginPath();
  ctx.moveTo(cx, top + h*0.12);
  ctx.lineTo(cx, bot - h*0.12);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

// --- scatter particles ---
function scatterParticles(cx, cy, configs) {
  configs.forEach(({x, y, r, color, alpha}) => {
    dot(cx+x, cy+y, r, color, alpha);
  });
}

// ================================================================
// LEFT: ORBITAL
// ================================================================
function drawOrbital(cx, cy) {
  const s = seed;
  const rx = s.oRadiusX, ry = s.oRadiusY;
  const ph = s.oPhase;

  // --- stream A front arc: top of ellipse, gray -> blue ---
  const afPts = sampleEllipseArc(cx, cy, rx, ry, Math.PI + ph, 0 + ph, 80, 0);
  strokeGradientPath(afPts, GRAY, BLUE, 3, 0.55, 0.9);

  // --- stream A back arc: bottom, blue -> amber, faded ---
  const abPts = sampleEllipseArc(cx, cy, rx, ry, 0 + ph, Math.PI + ph, 80, 0);
  strokeGradientPath(abPts, BLUE, AMBER, 3, 0.7, 0.35);   

  // --- stream B front arc: inner orbit, amber -> gray ---
  const ir = s.oInnerR;
  const bfPts = sampleEllipseArc(cx, cy, ir*1.1, ir*0.65, Math.PI*0.15 + ph, Math.PI*1.15 + ph, 60, 0);
  strokeGradientPath(bfPts, AMBER, GRAY, 1.8, 0.75, 0.35);

  // --- stream B back arc ---
  const bbPts = sampleEllipseArc(cx, cy, ir*1.1, ir*0.65, Math.PI*1.15 + ph, Math.PI*2.15 + ph, 60, 0);
  strokeGradientPath(bbPts, GRAY, BLUE, 1.8, 0.3, 0.65);

  // gate
  drawGate(cx, cy, 200, 0.17);

  // particles at crossing
  scatterParticles(cx, cy, [
    {x:-14, y:-8,  r:1.4, color:BLUE,  alpha:0.65},
    {x:  2, y:-14, r:0.9, color:AMBER, alpha:0.5},
    {x: -6, y:  8, r:1.1, color:BLUE,  alpha:0.55},
    {x:  8, y:  4, r:0.7, color:AMBER, alpha:0.4},
    {x: -8, y:-20, r:0.8, color:GRAY,  alpha:0.42},
    {x:  6, y: 18, r:0.6, color:GRAY,  alpha:0.35},
  ]);
}

// ================================================================
// RIGHT: VORTEX
// ================================================================
function drawVortex(cx, cy) {
  const s = seed;
  const ph = s.vPhase;

  // arm 1: wide outer CCW spiral, blue -> amber
  // approximated as a shrinking ellipse arc sequence
  const arm1 = [];
  const steps = 5;
  for (let i = 0; i < steps; i++) {
    const t = i / (steps-1);
    const rx = (340 - t*190) * s.vArm1Scale;
    const ry = (340 - t*190) * s.vArm1Scale * 0.82;
    const startA = Math.PI*1.1 + t*Math.PI*0.5 + ph;
    const endA   = startA + Math.PI*(1.2 - t*0.3);
    const seg = sampleEllipseArc(cx, cy, rx, ry, startA, endA, 30, 0);
    if (i === 0) arm1.push(...seg);
    else arm1.push(...seg.slice(1));
  }
strokeGradientPath(arm1, BLUE, AMBER, 2.8, 0.85, 0.35); 

  // arm 2: CW from lower-right, amber -> blue
  const arm2 = [];
  for (let i = 0; i < steps; i++) {
    const t = i / (steps-1);
    const rx = (335 - t*185) * s.vArm2Scale;
    const ry = (335 - t*185) * s.vArm2Scale * 0.8;
    const startA = -0.1 + t*Math.PI*0.5 - ph;
    const endA   = startA - Math.PI*(1.2 - t*0.3);
    const seg = sampleEllipseArc(cx, cy, rx, ry, startA, endA, 30, 0);
    if (i === 0) arm2.push(...seg);
    else arm2.push(...seg.slice(1));
  }
  strokeGradientPath(arm2, AMBER, BLUE, 2.8, 0.85, 0.35);

  // arm 3: thin cross-cut diagonal, gray cycle
  const arm3a = sampleEllipseArc(cx, cy, 285, 230, Math.PI*0.8 + ph, Math.PI*1.9 + ph, 60, 0);
  strokeGradientPath(arm3a, GRAY, BLUE, 1.4, 0.25, 0.55);
  const arm3b = sampleEllipseArc(cx, cy, 285, 230, Math.PI*1.9 + ph, Math.PI*2.8 + ph, 60, 0);
  strokeGradientPath(arm3b, BLUE, GRAY, 1.4, 0.55, 0.25); 

  // gate at eye
  drawGate(cx, cy, 150, 0.14);

  // particles at eye
  scatterParticles(cx, cy, [
    {x: -8, y: -4, r:1.4, color:GRAY,  alpha:0.6},
    {x:  6, y:  4, r:1.0, color:GRAY,  alpha:0.5},
    {x: -8, y: 10, r:0.8, color:BLUE,  alpha:0.45},
    {x:  8, y: -8, r:0.7, color:AMBER, alpha:0.45},
    {x:  0, y:-12, r:1.1, color:GRAY,  alpha:0.52},
    {x:  2, y: 14, r:0.6, color:GRAY,  alpha:0.35},
  ]);
}

// ================================================================
// WORDMARK
// ================================================================
function drawWordmark(cx, cy) {
  // hairline divider
  ctx.save();
  ctx.strokeStyle = 'rgba(180,178,169,0.1)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(cx, 80);
  ctx.lineTo(cx, H - 80);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = "500 72px 'JetBrains Mono', 'Fira Mono', 'Courier New', monospace";
  ctx.fillStyle = '#D3D1C7';
  ctx.letterSpacing = '-0.01em';
  ctx.fillText('MayaFlux', cx, cy - 68);

  ctx.font = "400 38px 'JetBrains Mono', 'Fira Mono', 'Courier New', monospace";
  ctx.fillStyle = '#5f5e5a';
  ctx.letterSpacing = '0.2em';
  ctx.fillText('MULTIMEDIA FRAMEWORK', cx, cy + 24);

  ctx.restore();
}

// ================================================================
// RENDER
// ================================================================
function render() {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  drawOrbital(480, 240);
  drawWordmark(960, 240);
  drawVortex(1440, 240);
}

render();
</script>
</body>
</html>
